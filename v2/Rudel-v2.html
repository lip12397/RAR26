<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Rudel v2 — MVP Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0c; overscroll-behavior: none; }
  body { font-family: 'Archivo', system-ui, sans-serif; }
  #root { height: 100%; }
  button { font-family: inherit; -webkit-appearance: none; }
  input { -webkit-appearance: none; }
  ::placeholder { color: rgba(246,245,241,0.32); }
  *::-webkit-scrollbar { width: 0; height: 0; }

  @keyframes v2Pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  @keyframes v2Flash {
    0%   { opacity: 0; transform: scale(1.15); }
    14%  { opacity: 1; transform: scale(1); }
    72%  { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="v2-data.jsx"></script>
<script type="text/babel" src="v2-logic.jsx"></script>
<script type="text/babel" src="v2-components.jsx"></script>
<script type="text/babel" src="v2-screens-setup.jsx"></script>
<script type="text/babel" src="v2-screens-game.jsx"></script>
<script type="text/babel" src="v2-app.jsx"></script>
</body>
</html>
